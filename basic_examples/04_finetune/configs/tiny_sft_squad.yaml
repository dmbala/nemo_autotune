# Track A: continue the nanoGPT-tiny checkpoint from Module 02 on SQuAD.
# Loads the consolidated HF-format directory emitted by Module 02 pretrain.
# Path is overridden at launch time by finetune.sh (--model.pretrained_model_name_or_path=...).

step_scheduler:
  global_batch_size: 32
  local_batch_size: 32
  ckpt_every_steps: 100
  val_every_steps: 50
  num_epochs: 1
  max_steps: 200

dist_env:
  backend: nccl
  timeout_minutes: 5

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

# from_pretrained (not from_config) — loads weights from the local consolidated dir
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: PATH_OVERRIDE_hf_ckpt_dir
  torch_dtype: bf16

checkpoint:
  enabled: true
  checkpoint_dir: PATH_OVERRIDE_ckpt_dir
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train
  limit_dataset_samples: 2000   # small for a laptop-scale demo

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  shuffle: false
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  limit_dataset_samples: 200

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

optimizer:
  _target_: torch.optim.AdamW
  lr: 5.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0
