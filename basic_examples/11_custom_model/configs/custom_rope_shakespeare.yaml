# Module 11: pretrain the custom RoPE-GPT on TinyShakespeare.
# The model is a transformers.PreTrainedModel subclass defined in
# 11_custom_model/custom_model.py. We reach it via
# NeMoAutoModelForCausalLM.from_config with a pointer to our config class.

step_scheduler:
  global_batch_size: 32
  local_batch_size: 32
  ckpt_every_steps: 200
  val_every_steps: 500
  num_epochs: 1
  max_steps: 500

dist_env:
  backend: nccl
  timeout_minutes: 5

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

# Our custom PretrainedModel + PretrainedConfig.
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: custom_model.RoPEGPTConfig
    vocab_size: 50258
    n_positions: 512
    n_embd: 192
    n_layer: 6
    n_head: 4
    bos_token_id: 50256
    eos_token_id: 50256

dataset:
  _target_: nemo_automodel.components.datasets.llm.nanogpt_dataset.NanogptDataset
  file_pattern: PATH_OVERRIDE_train_bin
  seq_len: 256
  shuffle_files: true
  align_to_bos: false
  bos_token: 50256

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  shuffle: false
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

checkpoint:
  enabled: true
  checkpoint_dir: PATH_OVERRIDE_ckpt_dir
  model_save_format: safetensors
  save_consolidated: true
