# 2-node HSDP: 2 data-parallel replicas, each FSDP2-sharded across 4 GPUs.
# Same model as fsdp2_dp4, launched with --nodes=2 --ntasks-per-node=4 (= world_size 8).
# dp_replicate_size=2 × dp_size=4 = 8 = world_size.

step_scheduler:
  global_batch_size: 128
  local_batch_size: 4
  ckpt_every_steps: 50
  val_every_steps: 100
  num_epochs: 1
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 15

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.GPT2Config
    vocab_size: 50258
    n_positions: 1024
    n_ctx: 1024
    n_embd: 768
    n_layer: 12
    n_head: 12
    bos_token_id: 50256
    eos_token_id: 50256

dataset:
  _target_: nemo_automodel.components.datasets.llm.nanogpt_dataset.NanogptDataset
  file_pattern: PATH_OVERRIDE_train_bin
  seq_len: 1024
  shuffle_files: true
  align_to_bos: false
  bos_token: 50256

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  shuffle: false
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

# HSDP = replicate across 2 nodes, shard within each node's 4 GPUs.
distributed:
  strategy: fsdp2
  dp_replicate_size: 2
  dp_size: 4
  tp_size: 1
  cp_size: 1
  sequence_parallel: false
  activation_checkpointing: true

checkpoint:
  enabled: true
  checkpoint_dir: PATH_OVERRIDE_ckpt_dir
  model_save_format: safetensors
  save_consolidated: true
