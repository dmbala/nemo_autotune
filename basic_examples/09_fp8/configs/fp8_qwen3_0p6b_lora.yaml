# Module 09: FP8 LoRA finetune of Qwen3-0.6B on SQuAD.
# Requires H100/H200 (native FP8) and Transformer Engine in the container —
# TE 2.11.0 is present in nemo-automodel-26.02-fixed.sif.
#
# FP8 block mirrors /opt/Automodel/examples/llm_finetune/baichuan/baichuan_2_7b_mock_fp8.yaml.
# LoRA block mirrors examples/llm_finetune/qwen/qwen3_0p6b_hellaswag_peft.yaml.

step_scheduler:
  global_batch_size: 64
  local_batch_size: 8
  ckpt_every_steps: 100
  val_every_steps: 50
  num_epochs: 1
  max_steps: 300

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-0.6B
  torch_dtype: bf16

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: true
  dim: 16
  alpha: 32
  use_triton: true

checkpoint:
  enabled: true
  checkpoint_dir: PATH_OVERRIDE_ckpt_dir
  model_save_format: safetensors
  save_consolidated: true
  is_peft: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

# torch.compile enables FP8's fused kernels. Without compile, FP8 still works
# but leaves measurable throughput on the table.
compile:
  enabled: true
  mode: default          # default | reduce-overhead | max-autotune
  fullgraph: false
  dynamic: false
  backend: null

fp8:
  enabled: true
  # Recipes (from TE):
  #   tensorwise          — one scale per tensor (simple, safe)
  #   rowwise             — one scale per row (better accuracy, small overhead)
  #   rowwise_with_gw_hp  — rowwise + keep grad-weight in high precision (slightly slower, safest)
  recipe_name: tensorwise
  enable_fsdp_float8_all_gather: true
  precompute_float8_dynamic_scale_for_fsdp: true
  force_recompute_fp8_weight_in_bwd: true
  # Skip FP8 for the output projection; it's loss-sensitive and tiny anyway.
  filter_fqns: ["lm_head"]
  # Set true for non-H100 testing (FP8 emulated in BF16). NEVER in production.
  emulate: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train
  limit_dataset_samples: 4000

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  limit_dataset_samples: 200

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
