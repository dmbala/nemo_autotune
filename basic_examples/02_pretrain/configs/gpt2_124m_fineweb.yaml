# Standard nanoGPT-style 124M pretrain on FineWeb-500M.
# Single-node 4-GPU FSDP2. Mirrors /opt/Automodel/examples/llm_pretrain/nanogpt_pretrain.yaml.
# Paths with PATH_OVERRIDE are set at launch time by pretrain.sh.

step_scheduler:
  global_batch_size: 64
  local_batch_size: 4
  ckpt_every_steps: 2000
  val_every_steps: 500
  num_epochs: 1
  max_steps: 6000

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

# GPT-2 small: 12 layers, 12 heads, 768 hidden, ctx=1024 → 124M params.
# HF-backed construction → save_pretrained works on consolidated checkpoints.
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.GPT2Config
    vocab_size: 50258
    n_positions: 1024
    n_ctx: 1024
    n_embd: 768
    n_layer: 12
    n_head: 12
    bos_token_id: 50256
    eos_token_id: 50256

dataset:
  _target_: nemo_automodel.components.datasets.llm.nanogpt_dataset.NanogptDataset
  file_pattern: PATH_OVERRIDE_train_bin
  seq_len: 1024
  shuffle_files: true
  align_to_bos: false
  bos_token: 50256

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  shuffle: false
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

optimizer:
  _target_: torch.optim.AdamW
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

distributed:
  strategy: fsdp2
  dp_size: none      # auto = world_size / (tp_size*pp_size*cp_size*ep_size)
  tp_size: 1
  cp_size: 1
  sequence_parallel: false
  activation_checkpointing: true

checkpoint:
  enabled: true
  checkpoint_dir: PATH_OVERRIDE_ckpt_dir
  model_save_format: safetensors
  save_consolidated: true
