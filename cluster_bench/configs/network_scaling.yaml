# World-size scaling target. Fixed model (Qwen2.5-7B); driver sweeps
# --nproc-per-node and --nnodes. Intra-node (1→4 GPU) isolates NVLink/NVSwitch;
# inter-node (4→16 GPU) isolates IB/RoCE.
#
# Invoked by `sbatch/scaling.slrm` which runs one benchmark per (nodes,gpus)
# point and appends to history.jsonl.

seed: 1234

benchmark:
  warmup_steps: 5
  peak_tflops: 989
  nsys_start: -1
  nsys_end: -1
  nsys_ranks: []
  num_nodes: 1      # overridden per run

step_scheduler:
  global_batch_size: 16
  local_batch_size: 2
  ckpt_every_steps: 1000
  val_every_steps: 1000
  num_epochs: 1
  max_steps: 30

distributed:
  strategy: fsdp2
  dp_size: none     # auto-expands to world_size
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true

dist_env:
  backend: nccl
  timeout_minutes: 15

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen2.5-7B

checkpoint:
  enabled: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 2048
  num_samples: 100000

dataloader:
  batch_size: null
  _target_: torch.utils.data.DataLoader
  num_workers: 0

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0
